# Project-wide Gradle settings.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
kotlin.code.style=official

# Habilita AndroidX (requerido para Compose y librerías modernas)
android.useAndroidX=true
# Habilita la regeneración de librerías antiguas a AndroidX
android.enableJetifier=true
# Suprime el aviso de compileSdk no soportado para la versión 36
android.suppressUnsupportedCompileSdk=36

# Protocolos TLS para el proxy
systemProp.https.protocols=TLSv1.2,TLSv1.3
